# Use Perlin grid generator via YAML (no PNG or Python generator script needed).
# grid_generator is resolved at load time; obstacle_map and mdownsample are ignored when grid_generator is set.
world:
  height: 20
  width: 20
  step_time: 0.1
  sample_time: 0.1
  offset: [0, 0]
  collision_mode: 'stop'
  control_mode: 'auto'
  mdownsample: 1
  grid_generator:
    name: perlin
    width: 200   # grid cells (map resolution)
    height: 200
    complexity: 0.12
    fill: 0.32
    fractal: 1
    attenuation: 0.5
    seed: 48     # optional; omit for random map each run

robot:
  - kinematics: {name: 'diff'}
    shape: {name: 'circle', radius: 0.3}
    state: [2, 2, 0]
    goal: [15, 18, 0]
    vel_max: [3, 1]
    behavior: {name: 'dash'}

    plot:
      show_trail: True
      traj_color: 'g'
      show_trajectory: True
      show_goal: True

    sensors:
      - type: 'lidar2d'
        range_min: 0
        range_max: 8
        angle_range: 3.14
        number: 60
        noise: False
        alpha: 0.3
